<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps E-commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">TechStore<span class="text-blue-600">.io</span></h1>
            <p class="text-sm text-gray-500 mt-2">Architecture DevOps & CI/CD</p>
        </div>

        <div id="login-section" class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 transition-all">
            <h2 class="text-xl font-bold mb-6 text-gray-800">Espace Client</h2>
            
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-2">Prénom ou Identifiant</label>
                <input type="text" id="username" placeholder="ex: Jean Dupont" 
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors shadow-sm outline-none">
            </div>
            
            <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md transition-transform transform hover:-translate-y-0.5">
                Accéder au portail
            </button>
        </div>

        <div id="app-section" class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 transition-all" style="display: none;">
            
            <div class="flex items-center justify-between mb-6 pb-4 border-b border-gray-100">
                <h2 id="greeting" class="text-lg font-bold text-gray-800">Bonjour !</h2>
                <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded">Connecté</span>
            </div>
            
            <h3 class="text-md font-semibold mb-4 text-gray-700">Nouvelle commande</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ID de la commande</label>
                    <input type="text" id="order-id" placeholder="ex: CMD-2024" 
                           class="w-full px-4 py-2 bg-gray-50 rounded-lg border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-colors">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Montant total (€)</label>
                    <input type="number" id="order-amount" placeholder="0.00" 
                           class="w-full px-4 py-2 bg-gray-50 rounded-lg border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-colors">
                </div>

                <div class="flex items-center mt-2 bg-gray-50 p-3 rounded-lg border border-gray-200">
                    <input type="checkbox" id="is-vip" class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500 border-gray-300">
                    <label for="is-vip" class="ml-3 text-sm font-medium text-gray-700 cursor-pointer">
                        Appliquer la remise VIP (-20%)
                    </label>
                </div>
            </div>

            <button id="order-btn" class="w-full mt-6 bg-gray-900 hover:bg-black text-white font-semibold py-3 px-4 rounded-lg shadow-md transition-all">
                Confirmer le paiement
            </button>

            <div id="result" class="mt-5 text-sm text-center rounded-lg p-3 empty:hidden"></div>
        </div>

    </div>

    <script src="/js/main.js" defer></script>
</body>
</html>
