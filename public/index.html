<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore.io</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen p-6">

    <div class="max-w-2xl mx-auto">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">TechStore<span class="text-blue-600">.io</span></h1>
            <p class="text-sm text-gray-500 mt-2">Architecture DevOps & CI/CD</p>
        </div>

        <!-- LOGIN -->
        <div id="login-section" class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <h2 class="text-xl font-bold mb-6 text-gray-800">Espace Client</h2>
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-2">Prénom ou Identifiant</label>
                <input type="text" id="username" placeholder="ex: Jean Dupont"
                       class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none shadow-sm">
            </div>
            <button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg shadow-md transition-transform transform hover:-translate-y-0.5">
                Accéder au portail
            </button>
        </div>

        <!-- APP -->
        <div id="app-section" style="display:none;" class="space-y-6">

            <!-- Header -->
            <div class="bg-white px-6 py-4 rounded-2xl shadow border border-gray-100 flex items-center justify-between">
                <h2 id="greeting" class="text-lg font-bold text-gray-800">Bonjour !</h2>
                <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-3 py-1 rounded-full">Connecté</span>
            </div>

            <!-- Catalogue produits -->
            <div class="bg-white p-6 rounded-2xl shadow border border-gray-100">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-md font-bold text-gray-800">Catalogue produits</h3>
                    <button id="toggle-add-product" class="text-sm text-blue-600 hover:underline font-medium">+ Ajouter un produit</button>
                </div>

                <!-- Formulaire ajout produit (caché par défaut) -->
                <div id="add-product-form" style="display:none;" class="mb-5 p-4 bg-gray-50 rounded-xl border border-gray-200 space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1">ID produit</label>
                            <input type="text" id="prod-id" placeholder="ex: PROD-001"
                                   class="w-full px-3 py-2 rounded-lg border border-gray-200 bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1">Nom</label>
                            <input type="text" id="prod-name" placeholder="ex: Laptop Pro"
                                   class="w-full px-3 py-2 rounded-lg border border-gray-200 bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1">Prix (€)</label>
                            <input type="number" id="prod-price" placeholder="0"
                                   class="w-full px-3 py-2 rounded-lg border border-gray-200 bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-gray-600 mb-1">Catégorie</label>
                            <input type="text" id="prod-category" placeholder="ex: electronics"
                                   class="w-full px-3 py-2 rounded-lg border border-gray-200 bg-white focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-2">
                            <select id="prod-type" class="px-3 py-2 rounded-lg border border-gray-200 bg-white text-sm outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="physical">Physique</option>
                                <option value="digital">Digital</option>
                            </select>
                        </div>
                        <div id="stock-field">
                            <input type="number" id="prod-stock" placeholder="Stock"
                                   class="w-24 px-3 py-2 rounded-lg border border-gray-200 bg-white text-sm outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <button id="add-product-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg text-sm transition-colors">
                        Ajouter au catalogue
                    </button>
                    <div id="product-result" class="text-sm text-center rounded-lg p-2 empty:hidden"></div>
                </div>

                <!-- Liste des produits -->
                <div id="product-list" class="space-y-2">
                    <p class="text-sm text-gray-400 text-center py-4">Aucun produit dans le catalogue.</p>
                </div>
                <button id="refresh-products" class="mt-3 w-full text-xs text-gray-400 hover:text-gray-600 transition-colors">
                    Actualiser le catalogue
                </button>
            </div>

            <!-- Nouvelle commande -->
            <div class="bg-white p-6 rounded-2xl shadow border border-gray-100">
                <h3 class="text-md font-bold text-gray-800 mb-4">Nouvelle commande</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ID de la commande</label>
                        <input type="text" id="order-id" placeholder="ex: CMD-2024"
                               class="w-full px-4 py-2 bg-gray-50 rounded-lg border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Montant total (€)</label>
                        <input type="number" id="order-amount" placeholder="0.00"
                               class="w-full px-4 py-2 bg-gray-50 rounded-lg border border-gray-200 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="flex items-center bg-gray-50 p-3 rounded-lg border border-gray-200">
                        <input type="checkbox" id="is-vip" class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500 border-gray-300">
                        <label for="is-vip" class="ml-3 text-sm font-medium text-gray-700 cursor-pointer">
                            Appliquer la remise VIP (-20%)
                        </label>
                    </div>
                </div>
                <button id="order-btn" class="w-full mt-5 bg-gray-900 hover:bg-black text-white font-semibold py-3 rounded-lg shadow-md transition-all">
                    Confirmer le paiement
                </button>
                <div id="result" class="mt-4 text-sm text-center rounded-lg p-3 empty:hidden"></div>
            </div>

        </div>
    </div>

    <script src="/js/main.js" defer></script>
</body>
</html>
