name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1 : Vérification de la qualité du code
  # ==========================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npx eslint src/

  # ==========================================
  # JOB 2 : Tests Unitaires et Intégration
  # ==========================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Jest Tests with Coverage
        run: npm run test:cov

  # ==========================================
  # JOB 3 : Vérification du build Docker
  # ==========================================
  docker-build:
      name: Build Docker Image
      runs-on: ubuntu-latest
      needs: [lint, test] # Attend que les tests soient verts
      steps:
        - name: Checkout code
          uses: actions/checkout@v5

        - name: Build Docker Image
          run: docker build -t devops-api:test .


