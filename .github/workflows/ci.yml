name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1 : Qualité du code (lint + typage)
  # ==========================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run ESLint
        run: npx eslint src/

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ==========================================
  # JOB 2 : Tests Unitaires et Intégration
  # ==========================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Jest Tests with Coverage
        run: npm run test:cov

  # ==========================================
  # JOB 3 : Analyse statique SonarCloud
  # ==========================================
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests with coverage
        run: npm run test:cov

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # JOB 4 : Scan sécurité des dépendances
  # ==========================================
  trivy-deps:
    name: Trivy — Scan dépendances
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Scan filesystem (dépendances npm)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ==========================================
  # JOB 4 : Build Docker + Scan image
  # ==========================================
  docker-build:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker Image
        run: docker build -t devops-api:test .

      - name: Scan image Docker (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-api:test
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

  # ==========================================
  # JOB 5 : Publication de l'image (CD)
  # ==========================================
  docker-push:
    name: Push to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: [docker-build, trivy-deps, sonarcloud]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/project_cicd:latest
            ghcr.io/${{ github.repository_owner }}/project_cicd:${{ github.sha }}
